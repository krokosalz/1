<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>02A - Aufgabe</title>
    <style>
      /* Styling for the div that holds all buttons*/
      #buttons {
        display: grid;
        grid-template-columns: auto auto auto;
      }

      /* Styling for the button */
      .btn {
        display: inline-block;
        font-size: 2em;
        padding: 10px;
        margin: 10px;
        background-color: lightgray
      }
    </style>

    <script src="aufgabe_1_script.js" defer></script>
  </head>
  <body>
    <div id="buttons">
      <button id="btn1" class="btn">Button 1</button>
      <button id="btn2" class="btn">Button 2</button>
      <button id="btn3" class="btn">Button 3</button>
    </div>

  </body>
</html>
